name: publish_wheel

on:
  workflow_dispatch:
    inputs:
      dry_publish:
        description: 'Dry publish (no upload)'
        type: boolean
        required: false
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v6

    - name : Create Wheel
      run : |
        uv build --wheel

    - uses: actions/upload-artifact@v4
      with:
        name: wheel
        path: dist/*.whl

  test:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        py: [
          "3.9",
          "3.10",
          "3.11",
          "3.12",
        ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: wheel

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.py }}
        enable-cache: false
        ignore-empty-workdir: true

    - name: Install Python package
      run: |
        uv venv
        uv pip install $(ls *.whl)

    - name: Test installed Python package
      run: |
        uv run python -c "import morpholayers"

  publish:
    needs: test
    if: ${{inputs.dry_publish == false}}
    runs-on: ubuntu-latest
    steps:
    # Upload packages to pypi
    - uses: fabien-ors/pypi-publish-action@v2
      with:
        repo: pypi
        username: __token__
        password: ${{secrets.TWINE_PYPI_PWD}}
        pattern: wheel

    # Delete the artifacts (to free GitHub storage space)
    - uses: geekyeggo/delete-artifact@v5
      with:
        name: wheel
